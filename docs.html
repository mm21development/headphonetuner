<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Documentation - Headphone Tuner PEQ Pro</title>
    <link rel="stylesheet" href="style/docs.css">
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    <script src="javascript/version.js"></script>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-back">← Back / Zurück</a>

    <zero-md id="mdContainer" src="./README.md">
        <template>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sindresorhus/github-markdown-css@5/github-markdown.css" />
            <style>
                .markdown-body {
                    background: transparent !important;
                    color: inherit;
                }
                @media (prefers-color-scheme: dark) { .markdown-body { color-scheme: dark; } }
            </style>
        </template>
    </zero-md>

    <footer>
        <p>Headphone Tuner (PEQ Pro) - Version: <span id="versionTag">Ermittle...</span></p>
    </footer>
</div>

<script>
    function applyTheme() {
        const savedTheme = localStorage.getItem('theme');
        const isDarkSystem = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (savedTheme === null && isDarkSystem);
        
        if (isDark) {
            document.body.classList.add('dark-mode');
            document.getElementById('mdContainer').classList.add('markdown-body-dark');
        }
    }
    applyTheme();
</script>

</body>
</html>
