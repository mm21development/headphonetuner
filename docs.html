<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Documentation - Headphone Tuner PEQ Pro</title>
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    <script src="./version.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --accent-color: #007bff;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }
        .nav-back {
            margin-bottom: 20px;
            display: inline-block;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            text-align: center;
        }
        /* Styling für den Markdown-Inhalt */
        zero-md {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-back">← Zurück zum Tuner</a>

    <zero-md id="mdContainer" src="./README.md">
        <template>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sindresorhus/github-markdown-css@5/github-markdown.css" />
            <style>
                .markdown-body {
                    background: transparent !important;
                    color: inherit;
                }
                @media (prefers-color-scheme: dark) { .markdown-body { color-scheme: dark; } }
            </style>
        </template>
    </zero-md>

    <footer>
        <p>Headphone Tuner (PEQ Pro) - Version: <span id="versionTag">Ermittle...</span></p>
    </footer>
</div>

<script>
    function applyTheme() {
        const savedTheme = localStorage.getItem('theme');
        const isDarkSystem = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (savedTheme === null && isDarkSystem);
        
        if (isDark) {
            document.body.classList.add('dark-mode');
            document.getElementById('mdContainer').classList.add('markdown-body-dark');
        }
    }
    applyTheme();
</script>

</body>
</html>
